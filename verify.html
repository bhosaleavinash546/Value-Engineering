<script>
(function () {
  "use strict";
  const $ = (s) => document.querySelector(s);
  const form = $("#verify-form"), input = $("#cert-id"), out = $("#verify-result"), btn = form.querySelector("button");

  // token from certificate share links can be decoded locally as a fallback
  function decodeToken(t) {
    try { return JSON.parse(decodeURIComponent(escape(atob(t.replace(/-/g, "+").replace(/_/g, "/"))))); } catch { return null; }
  }

  // escape anything user- or database-controlled before it enters innerHTML
  function esc(v) {
    return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function card(kind, title, body) {
    const colors = { ok: ["#34d399", "rgba(52,211,153,.1)", "rgba(52,211,153,.4)"], no: ["#f87171", "rgba(248,113,113,.1)", "rgba(248,113,113,.4)"], info: ["#d9a44a", "rgba(217,164,74,.1)", "rgba(217,164,74,.4)"] }[kind];
    out.innerHTML = '<div style="border:1px solid ' + colors[2] + ';background:' + colors[1] + ';border-radius:14px;padding:1.4rem">' +
      '<div style="font-family:var(--font-d);font-weight:700;font-size:1.15rem;color:' + colors[0] + ';margin-bottom:.5rem">' + title + '</div>' +
      '<div style="font-size:.9rem;color:var(--muted)">' + body + '</div></div>';
  }

  async function run(id) {
    id = (id || "").trim();
    if (!id) return;
    // Short IDs (VH-XXXX) are case-normalised; long share tokens are left intact (base64 is case-sensitive).
    if (id.length < 20) id = id.toUpperCase();
    input.value = id;
    btn.classList.add("is-loading"); btn.disabled = true;
    const res = await window.VHCloud.verifyCertificate(id);
    btn.classList.remove("is-loading"); btn.disabled = false;
    if (res.status === "valid") {
      const c = res.cert, d = new Date(c.issued_at).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
      card("ok", "✓ Valid certificate", "<b style='color:var(--txt)'>" + esc(c.full_name) + "</b> passed the Value Engineering 360° Practitioner exam with a score of <b style='color:var(--txt)'>" + esc(c.score) + "%</b>, issued " + esc(d) + ". ID " + esc(c.id) + ".");
    } else if (res.status === "notfound") {
      card("no", "✗ Not found", "No certificate with ID <b style='color:var(--txt)'>" + esc(id) + "</b> was found in our records. Check the ID, or ask the holder to re-share their certificate link.");
    } else {
      // demo/offline: try decoding a token pasted from a share link
      const t = decodeToken(id);
      if (t && t.n && t.id) {
        const d = new Date(t.d).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
        card("info", "Certificate details (unverified)", "<b style='color:var(--txt)'>" + esc(t.n) + "</b> · score <b style='color:var(--txt)'>" + esc(t.s) + "%</b> · issued " + esc(d) + " · ID " + esc(t.id) + ".<br><span style='font-size:.8rem'>Central verification isn't enabled yet — these details are read from the share link itself.</span>");
      } else {
        card("info", "Verification not available", "Central verification is not enabled on this deployment yet. Paste the full certificate share link to read its details, or contact VAVEhub with the ID.");
      }
    }
  }

  form.addEventListener("submit", (e) => { e.preventDefault(); run(input.value); });
  const qid = new URLSearchParams(location.search).get("id");
  if (qid) run(qid);
})();
</script>
